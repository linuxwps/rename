name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rname/package-lock.json

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: npm ci
        working-directory: rname

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: rname

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: Rename-macOS
          path: rname/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rname/package-lock.json

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: npm ci
        working-directory: rname

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: rname

      - name: Upload .msi
        uses: actions/upload-artifact@v4
        with:
          name: Rename-Windows
          path: rname/src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rname/package-lock.json

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci
        working-directory: rname

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: rname

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: Rename-Linux
          path: rname/src-tauri/target/release/bundle/deb/*.deb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Rename-macOS
          path: release
      - uses: actions/download-artifact@v4
        with:
          name: Rename-Windows
          path: release
      - uses: actions/download-artifact@v4
        with:
          name: Rename-Linux
          path: release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
          generate_release_notes: true
